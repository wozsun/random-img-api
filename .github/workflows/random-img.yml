name: Random Img Test

on:
  push:
  workflow_dispatch:

jobs:
  random-img-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      ASSET_BASE_URL: ${{ secrets.ASSET_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required env vars
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is required (set repository secret BASE_URL)"
            exit 1
          fi
          if [ -z "$ASSET_BASE_URL" ]; then
            echo "ASSET_BASE_URL is required (set repository secret ASSET_BASE_URL)"
            exit 1
          fi

      - name: Wait for deployment propagation
        run: sleep 60

      - name: Run test
        shell: bash
        run: python random-img/test.py
